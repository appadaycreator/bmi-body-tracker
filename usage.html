<h1>📋 使い方</h1><h2>BMI計算タブ</h2><p>性別・身長・体重・年齢を入力するとBMI・標準体重・体脂肪率（推定）が自動計算されます。目標BMIも設定して達成までの期間を確認できます。</p><h2>体重記録タブ</h2><p>毎日の体重を入力して記録。推移グラフと一覧で体重の変化を確認できます。データはブラウザに保存されます。</p><h2>アドバイスタブ</h2><p>BMIに応じた食事・運動のアドバイスと1日の消費カロリー目安が表示されます。</p>
